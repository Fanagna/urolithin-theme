  <line x1="60" y1="68" x2="240" y2="68" stroke="#b87316" stroke-width="0.5" opacity="0.15"/>
  <!-- Content -->
  <text x="150" y="92" text-anchor="middle" fill="#5a4030" font-family="Georgia,serif" font-size="10">Urolithin A — Liposomal</text>
