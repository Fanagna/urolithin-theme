<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 224" fill="none">
  <defs>
    <linearGradient id="coaBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffcf7"/>
      <stop offset="100%" stop-color="#fffaf4"/>
    </linearGradient>
  </defs>
  <rect x="5" y="5" width="290" height="214" rx="8" fill="url(#coaBg)" stroke="#b87316" stroke-width="0.8" stroke-opacity="0.25"/>
